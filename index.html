<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laura Gaming</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }

    body {
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
      background:#040404;
      overflow:hidden;
      cursor:none;
    }

    /* Animated gradient background */
    .bg {
      position:fixed;
      width:100%;
      height:100%;
      background: radial-gradient(circle at 20% 30%, #400000, transparent 60%),
                  radial-gradient(circle at 80% 70%, #200000, transparent 60%),
                  #040404;
      animation: moveBg 12s infinite alternate ease-in-out;
      z-index:-2;
    }

    @keyframes moveBg {
      0% { transform: scale(1) translate(0,0); }
      100% { transform: scale(1.3) translate(-30px,-30px); }
    }

    /* Mouse glow */
    .cursor-glow {
      position:fixed;
      width:200px;
      height:200px;
      border-radius:50%;
      background: radial-gradient(circle, rgba(255,0,0,0.4), transparent 70%);
      pointer-events:none;
      transform: translate(-50%, -50%);
      z-index:-1;
      filter: blur(30px);
    }

    .container {
      text-align:center;
      backdrop-filter: blur(25px);
      background: rgba(255,0,0,0.06);
      border:1px solid rgba(255,0,0,0.25);
      padding:55px 45px;
      border-radius:30px;
      box-shadow:0 0 60px rgba(255,0,0,0.25);
      animation: fadeIn 1.2s ease forwards;
      transition:0.4s;
    }

    .container:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow:0 0 80px rgba(255,0,0,0.4);
    }

    @keyframes fadeIn {
      from { opacity:0; transform: translateY(25px); }
      to { opacity:1; transform: translateY(0); }
    }

    .logo {
      width:150px;
      height:150px;
      border-radius:50%;
      object-fit:cover;
      border:3px solid #ff0000;
      margin-bottom:18px;
      box-shadow:0 0 35px rgba(255,0,0,0.9);
      animation: glowPulse 2s infinite alternate;
    }

    @keyframes glowPulse {
      from { box-shadow:0 0 20px rgba(255,0,0,0.5); }
      to { box-shadow:0 0 45px rgba(255,0,0,1); }
    }

    h1 {
      font-size:34px;
      margin-bottom:30px;
      letter-spacing:1px;
    }

    .buttons {
      display:flex;
      flex-direction:column;
      gap:18px;
      margin-bottom:25px;
    }

    .btn {
      display:flex;
      align-items:center;
      justify-content:center;
      gap:14px;
      padding:16px;
      border-radius:16px;
      text-decoration:none;
      color:white;
      background: rgba(0,0,0,0.65);
      border:1px solid rgba(255,0,0,0.5);
      width:300px;
      margin:0 auto;
      position:relative;
      overflow:hidden;
      transition:0.35s;
      font-size:15px;
    }

    .btn::before {
      content:"";
      position:absolute;
      width:100%;
      height:100%;
      top:0;
      left:-100%;
      background: linear-gradient(120deg, transparent, rgba(255,0,0,0.5), transparent);
      transition:0.6s;
    }

    .btn:hover::before { left:100%; }

    .btn:hover {
      transform:scale(1.1);
      box-shadow:0 0 25px rgba(255,0,0,0.9);
      background: rgba(255,0,0,0.25);
    }

    .btn img { width:24px; height:24px; }

    .family {
      margin-top:12px;
      font-size:15px;
      opacity:0.9;
    }

    footer {
      position:absolute;
      bottom:18px;
      width:100%;
      text-align:center;
      font-size:12px;
      opacity:0.6;
    }

    @media(max-width:500px) {
      .container { padding:40px 25px; }
      .btn { width:240px; }
    }
  </style>
</head>

<body>

<div class="bg"></div>
<div class="cursor-glow" id="glow"></div>

<div class="container">

  <img src="logo.png" class="logo" alt="Logo">

  <h1>Laura Gaming</h1>

  <div class="buttons">

    <a href="https://www.tiktok.com/@_lauragaming" class="btn" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/3046/3046126.png">
      TikTok
    </a>

    <a href="https://hellcase.com/flaura" class="btn" target="_blank">
      <img src="https://hellcase.com/favicon.ico">
      Hellcase
    </a>

    <a href="https://discord.gg/abH9T5tTu6" class="btn" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
      Discord Server
    </a>

    <a href="https://steamcommunity.com/profiles/76561199867378384/" class="btn" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/5968/5968705.png">
      Steam Profile
    </a>

  </div>

  <div class="family">Shqiponjat Family</div>

</div>

<footer>
  © 2026 Laura Gaming. Website created by DuRo. All rights reserved.
</footer>

<script>
  const glow = document.getElementById('glow');
  document.addEventListener('mousemove', (e) => {
    glow.style.left = e.clientX + 'px';
    glow.style.top = e.clientY + 'px';
  });
</script>

</body>
</html>
