<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laura Gaming</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }

    body {
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
      background:#030303;
      overflow:hidden;
      cursor:crosshair;
    }

    .bg {
      position:fixed;
      width:100%;
      height:100%;
      background: radial-gradient(circle at 20% 30%, #500000, transparent 60%),
                  radial-gradient(circle at 80% 70%, #250000, transparent 60%),
                  #030303;
      animation: moveBg 14s infinite alternate ease-in-out;
      z-index:-2;
    }

    @keyframes moveBg {
      0% { transform: scale(1) translate(0,0); }
      100% { transform: scale(1.4) translate(-40px,-40px); }
    }

    .cursor-glow {
      position:fixed;
      width:260px;
      height:260px;
      border-radius:50%;
      background: radial-gradient(circle, rgba(255,0,0,0.35), transparent 70%);
      pointer-events:none;
      transform: translate(-50%, -50%);
      z-index:-1;
      filter: blur(35px);
    }

    .container {
      text-align:center;
      backdrop-filter: blur(30px);
      background: rgba(255,0,0,0.07);
      border:1px solid rgba(255,0,0,0.3);
      padding:70px 60px;
      border-radius:35px;
      box-shadow:0 0 100px rgba(255,0,0,0.35);
      animation: fadeIn 1.2s ease forwards;
      transition:0.4s;
    }

    .logo {
      width:180px;
      height:180px;
      border-radius:50%;
      object-fit:cover;
      border:4px solid #ff0000;
      margin-bottom:15px;
      box-shadow:0 0 50px rgba(255,0,0,1);
      animation: glowPulse 2s infinite alternate;
    }

    @keyframes glowPulse {
      from { box-shadow:0 0 25px rgba(255,0,0,0.6); }
      to { box-shadow:0 0 60px rgba(255,0,0,1); }
    }

    h1 {
      font-size:40px;
      margin-bottom:5px;
    }

    .subtitle {
      font-size:13px;
      font-weight:800;
      opacity:0.9;
      margin-bottom:30px;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:6px;
    }

    .subtitle img {
      width:18px;
      height:12px;
      border-radius:2px;
    }

    .buttons {
      display:flex;
      flex-direction:column;
      gap:22px;
      margin-bottom:25px;
    }

    .btn {
      display:flex;
      align-items:center;
      justify-content:center;
      gap:16px;
      padding:20px;
      border-radius:18px;
      text-decoration:none;
      color:white;
      background: rgba(0,0,0,0.7);
      border:1px solid rgba(255,0,0,0.6);
      width:340px;
      margin:0 auto;
      position:relative;
      overflow:hidden;
      transition:0.35s;
      font-size:17px;
    }

    .btn::before {
      content:"";
      position:absolute;
      width:100%;
      height:100%;
      top:0;
      left:-100%;
      background: linear-gradient(120deg, transparent, rgba(255,0,0,0.6), transparent);
      transition:0.6s;
    }

    .btn:hover::before { left:100%; }

    .btn:hover {
      transform:scale(1.12);
      box-shadow:0 0 35px rgba(255,0,0,1);
      background: rgba(255,0,0,0.3);
    }

    .btn img { width:28px; height:28px; }

    .live {
      font-size:12px;
      margin-top:5px;
      opacity:0.8;
    }

    footer {
      position:absolute;
      bottom:20px;
      width:100%;
      text-align:center;
      font-size:13px;
      opacity:0.7;
    }
  </style>
</head>

<body>

<div class="bg"></div>
<div class="cursor-glow" id="glow"></div>

<div class="container">

  <img src="logo.png" class="logo" alt="Logo">

  <h1>Laura Gaming</h1>

  <div class="subtitle">
    <img src="https://flagcdn.com/w40/al.png">
    Shqiponjat Family Leader
  </div>

  <div class="buttons">

    <a href="https://www.tiktok.com/@_lauragaming" class="btn" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/3046/3046126.png">
      TikTok
    </a>
    <div class="live" id="tiktokStatus">Checking TikTok status...</div>

    <a href="https://hellcase.com/flaura" class="btn" target="_blank">
      <img src="https://hellcase.com/favicon.ico">
      Hellcase
    </a>

    <a href="https://discord.gg/abH9T5tTu6" class="btn" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
      Discord Server
    </a>
    <div class="live" id="discordCount">Loading Discord members...</div>

    <a href="https://steamcommunity.com/profiles/76561199867378384/" class="btn" target="_blank">
      <img src="https://imgs.search.brave.com/U-NRFq6vLZNa4qRWHnM2AcT4kKzDu1FKgB0Rf6RHTKU/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9jZG4uZmFzdGx5LnN0ZWFtc3RhdGljLmNvbS9zdG9yZS9hYm91dC9pY29uLXN0ZWFtb3Muc3Zn">
      Steam Profile
    </a>

  </div>

</div>

<footer>
  © 2026 Laura Gaming. Website created by DuRo. All rights reserved.
</footer>

<script>
  const glow = document.getElementById('glow');
  document.addEventListener('mousemove', (e) => {
    glow.style.left = e.clientX + 'px';
    glow.style.top = e.clientY + 'px';
  });

  // Discord live count (basic public widget)
  fetch("https://discord.com/api/guilds/abH9T5tTu6/widget.json")
    .then(res => res.json())
    .then(data => {
      document.getElementById("discordCount").innerText = data.presence_count + " members online";
    })
    .catch(() => {
      document.getElementById("discordCount").innerText = "Join Discord to see members";
    });

  // TikTok status (fake fallback because no public API)
  document.getElementById("tiktokStatus").innerText = "Check TikTok for live status";
</script>

</body>
</html>
