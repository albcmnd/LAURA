<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laura Gaming</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0a0a0a, #1a0000);
      color: white;
    }

    .container {
      text-align: center;
    }

    .logo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #ff0000;
      margin-bottom: 15px;
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 25px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 20px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 20px;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      background: #1a1a1a;
      border: 1px solid #ff0000;
      transition: 0.3s;
      width: 250px;
      margin: 0 auto;
    }

    .btn img {
      width: 20px;
      height: 20px;
    }

    .btn:hover {
      background: #ff0000;
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.7);
    }

    .family {
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.8;
    }

    footer {
      position: absolute;
      bottom: 15px;
      width: 100%;
      text-align: center;
      font-size: 12px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- Logo -->
    <img src="logo.png" alt="Logo" class="logo">

    <!-- Name -->
    <h1>Laura Gaming</h1>

    <!-- Buttons -->
    <div class="buttons">

      <a href="https://www.tiktok.com/@_lauragaming" class="btn" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/3046/3046126.png">
        TikTok
      </a>

      <a href="https://hellcase.com/flaura" class="btn" target="_blank">
        <img src="https://hellcase.com/favicon.ico">
        Hellcase
      </a>

      <a href="https://discord.gg/abH9T5tTu6" class="btn" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
        Discord Server
      </a>

      <a href="https://steamcommunity.com/profiles/76561199867378384/" class="btn" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/5968/5968705.png">
        Steam Profile
      </a>

    </div>

    <!-- Text under buttons -->
    <div class="family">Shqiponjat Family</div>

  </div>

  <!-- Footer -->
  <footer>
    © 2026 Laura Gaming. Website created by DuRo. All rights reserved.
  </footer>

</body>
</html>
